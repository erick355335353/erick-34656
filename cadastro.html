<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - EduConnect</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #666; }
        input[type="text"], input[type="email"], input[type="password"] { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .checkbox-group { display: flex; align-items: flex-start; margin-top: 15px; font-size: 14px; color: #555; }
        .checkbox-group input { margin-right: 10px; margin-top: 3px; }
        .checkbox-group a { color: #0056b3; text-decoration: none; }
        .checkbox-group a:hover { text-decoration: underline; }
        button { width: 100%; padding: 12px; background-color: #0056b3; border: none; border-radius: 4px; color: white; font-size: 16px; cursor: pointer; margin-top: 20px; }
        button:hover { background-color: #004494; }
        footer { text-align: center; margin-top: 20px; font-size: 12px; color: #999; }
        footer a { color: #999; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Criar Conta - EduConnect</h2>
        <form id="cadastroForm">
            <div class="form-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" name="nome" required>
            </div>
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" required>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="aceite_politica" name="aceite_politica">
                <label for="aceite_politica">
                    Li e aceito a <a href="politica-de-privacidade.html" target="_blank">Política de Privacidade</a> do EduConnect.
                </label>
            </div>

            <button type="submit">Cadastrar</button>
        </form>

        <footer>
            <p>&copy; 2026 EduConnect. Todos os direitos reservados.</p>
            <p><a href="politica-de-privacidade.html">Política de Privacidade</a></p>
        </footer>
    </div>

    <script>
        document.getElementById('cadastroForm').addEventListener('submit', function(event) {
            const checkbox = document.getElementById('aceite_politica');
            
            if (!checkbox.checked) {
                // Impede o envio do formulário
                event.preventDefault();
                alert('Você deve ler e aceitar a Política de Privacidade para continuar.');
            } else {
                // Simulação de sucesso no envio
                alert('Cadastro realizado com sucesso! (Simulação)');
            }
        });
    </script>
</body>
</html>
